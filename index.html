<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Mesin CIM</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #d9534f;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #c9302c;
        }
    </style>
</head>
<body>

    <button id="tombolError">Trigger Error CIM</button>

    <script>
        // 1. Daftarkan Service Worker saat halaman dimuat
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
            .then(function(registration) {
                console.log('Service Worker terdaftar dengan scope:', registration.scope);
            }).catch(function(error) {
                console.log('Pendaftaran Service Worker gagal:', error);
            });
        }

        const tombol = document.getElementById('tombolError');

        tombol.addEventListener('click', () => {
            const pesanError = "ERROR MESIN CIM TIDAK BERJALAN";

            // Munculkan alert web terlebih dahulu
            alert(pesanError);

            // 2. Gunakan Service Worker untuk mengirim notifikasi di HP & PC
            if ("Notification" in window && navigator.serviceWorker) {
                Notification.requestPermission().then(function (permission) {
                    if (permission === "granted") {
                        navigator.serviceWorker.ready.then(function(registration) {
                            registration.showNotification("Peringatan Sistem", {
                                body: pesanError,
                                icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png",
                                vibrate: [200, 100, 200] // Tambahan fitur getar untuk HP
                            });
                        });
                    }
                });
            }
        });
    </script>

</body>
</html>
