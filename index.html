<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Coba Notif CIM</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            color: white;
            background-color: #d9534f;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:hover { background-color: #c9302c; }
    </style>
</head>
<body>

    <button id="tombolError">Test Notif HP</button>

    <script>
        // 1. Daftarkan Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker siap!'))
                .catch(err => console.error('Service Worker gagal:', err));
        }

        const tombol = document.getElementById('tombolError');

        tombol.addEventListener('click', async () => {
            // Cek dukungan browser
            if (!("Notification" in window) || !('serviceWorker' in navigator)) {
                console.log("Browser tidak mendukung notifikasi sistem.");
                return;
            }

            // Minta izin jika belum ada
            let permission = Notification.permission;
            if (permission !== "granted") {
                permission = await Notification.requestPermission();
            }

            // Jika diizinkan, Tembak Notifikasi via Service Worker
            if (permission === "granted") {
                const swRegistration = await navigator.serviceWorker.ready;
                swRegistration.showNotification("⚠️ PERINGATAN SISTEM", {
                    body: "ERROR MESIN CIM TIDAK BERJALAN",
                    icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png",
                    vibrate: [200, 100, 200, 100, 200], // Pola getaran HP
                    requireInteraction: true // Notif tidak akan hilang sebelum di-swipe/diklik (berguna untuk error mesin)
                });
                console.log("Notifikasi berhasil dipicu!");
            } else {
                console.log("Izin notifikasi ditolak oleh user.");
            }
        });
    </script>

</body>
</html>
