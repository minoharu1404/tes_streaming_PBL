<script>
        // 1. Daftarkan Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW Registered!'))
                .catch(err => console.error('SW Registration failed!', err));
        }

        const tombol = document.getElementById('tombolError');

        tombol.addEventListener('click', async () => {
            const pesanError = "ERROR MESIN CIM TIDAK BERJALAN";

            // Cek apakah browser mendukung notifikasi
            if (!("Notification" in window)) {
                alert("Browser tidak mendukung notifikasi.\n\n" + pesanError);
                return;
            }

            // Minta izin jika belum pernah ditanya
            if (Notification.permission !== "granted" && Notification.permission !== "denied") {
                await Notification.requestPermission();
            }

            // Jika izin diberikan, jalankan notifikasi sistem HP DULU
            if (Notification.permission === "granted" && 'serviceWorker' in navigator) {
                navigator.serviceWorker.ready.then((registration) => {
                    registration.showNotification("Peringatan Sistem", {
                        body: pesanError,
                        icon: "https://cdn-icons-png.flaticon.com/512/564/564619.png",
                        vibrate: [200, 100, 200, 100, 200] // Bikin HP bergetar 
                    });
                    
                    // Beri jeda 0.5 detik sebelum memunculkan pop-up web, 
                    // agar notif di bar HP punya waktu untuk tereksekusi.
                    setTimeout(() => {
                        alert(pesanError);
                    }, 500); 
                });
            } else {
                // Fallback jika izin notif diblokir user
                alert(pesanError);
            }
        });
    </script>
